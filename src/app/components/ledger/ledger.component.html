<div class="space-y-6 mt-6">
  <div class="card !bg-[#2E2E2E] !text-white p-6">
    <div class="flex items-center justify-between">
      <div class="text-white/70 text-xs font-bold uppercase tracking-widest">Exchange Rate</div>
      <button class="btn-ghost px-3 py-1 text-xs bg-white/10 border-white/20 text-white"
        (click)="ledger.rateEdit = !ledger.rateEdit">
        RATE: {{ ledger.rate }}
      </button>
    </div>

    <div class="flex justify-between items-end mt-2">
      <span class="text-5xl font-extrabold">¥ {{ ledger.jpyInput || '0' }}</span>
      <span class="text-2xl font-bold text-white/90">≈ NT$ {{ ledger.twd }}</span>
    </div>

    <div *ngIf="ledger.rateEdit" class="mt-4">
      <input class="w-full card bg-white p-3 text-[#2E2E2E]" type="number" step="0.001"
        [value]="ledger.rate" (input)="ledger.onRateInput($event)" />
      <div class="text-xs text-white/60 mt-2">例：0.21（1 JPY = 0.21 TWD）</div>
    </div>
  </div>

  <div class="grid grid-cols-3 gap-3">
    <button
      *ngFor="let key of ledger.keys"
      (click)="ledger.pressKey(key)"
      class="card bg-white py-6 text-2xl font-extrabold text-[#2E2E2E] rounded-2xl active:scale-[0.99] transition"
    >{{ key }}</button>
  </div>

  <button class="w-full btn-primary text-xl flex items-center justify-center gap-3 py-4 rounded-full"
    (click)="ledger.saveExpense()">
    SAVE EXPENSE 💾
  </button>

  <div class="space-y-3">
    <div *ngIf="ledger.expenses.length === 0" class="text-sm opacity-60">還沒有記帳紀錄</div>
    <div class="card bg-white p-4" *ngFor="let item of ledger.expenses">
      <div class="flex justify-between items-baseline">
        <div class="text-xl font-extrabold text-[#2E2E2E]">¥{{ item.jpy }}</div>
        <div class="text-lg font-extrabold text-[#FF5A5F]">NT${{ item.twd }}</div>
      </div>
      <div class="text-xs opacity-60 mt-1">{{ item.time }}</div>
    </div>
  </div>
</div>
