<div class="space-y-2">
  <div *ngIf="items.length === 0" class="text-center py-12 text-gray-300">
    <div class="text-4xl mb-2">{{ kind === 'packing' ? '🧳' : '🎁' }}</div>
    <div class="text-sm">還沒有項目，點右下角 + 新增</div>
  </div>

  <div *ngFor="let t of items"
    class="bg-white rounded-2xl border border-gray-100 shadow-[0_2px_8px_-4px_rgba(0,0,0,0.07)] p-4 flex items-center gap-3">
    <input
      type="checkbox"
      class="w-5 h-5 accent-[#FF5A5F] shrink-0 cursor-pointer"
      [checked]="t.done"
      (change)="trip.toggleChecklistDone(kind, t.id)"
    />
    <div class="flex-1 text-[15px] font-bold leading-snug"
      [class.line-through]="t.done" [class.text-gray-300]="t.done"
      [class.text-[#1A1A1A]]="!t.done">
      {{ t.label }}
    </div>
    <div class="flex gap-1.5 shrink-0">
      <button class="icon-btn" (click)="editItem.emit({ kind: kind, item: t })">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
        </svg>
      </button>
      <button class="icon-btn" (click)="deleteItem(t.id)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18"/><path d="M8 6V4h8v2"/>
          <path d="M19 6l-1 14H6L5 6"/>
        </svg>
      </button>
    </div>
  </div>
</div>
