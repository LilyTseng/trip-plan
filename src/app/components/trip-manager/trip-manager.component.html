<div *ngIf="isOpen" class="fixed inset-0 z-[80] flex items-end sm:items-center justify-center">
  <div class="absolute inset-0 bg-black/35" (click)="close()"></div>

  <div
    class="relative w-full max-w-md mx-auto rounded-t-3xl sm:rounded-3xl bg-white shadow-[0_30px_90px_-35px_rgba(0,0,0,0.55)] border border-gray-200 p-5 sm:p-6"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="flex items-start justify-between">
      <div>
        <div class="text-xs uppercase tracking-widest opacity-60">Trips</div>
        <div class="text-2xl h2 mt-1">
          {{ stage === 'list' ? '我的旅遊' : stage === 'add' ? '新增旅遊' : '編輯旅遊' }}
        </div>
      </div>
      <button class="btn-ghost w-9 h-9 flex items-center justify-center rounded-full" (click)="close()" aria-label="關閉">
        <svg class="w-5 h-5 text-gray-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- LIST -->
    <div *ngIf="stage === 'list'" class="mt-5 space-y-3">
      <div
        *ngFor="let t of trip.trips"
        class="card p-4"
        [style.border]="t.id === trip.activeTripId ? '2px solid #FF5A5F' : '1px solid #e5e7eb'"
      >
        <div class="flex items-center justify-between gap-3">
          <div class="flex-1 min-w-0">
            <div class="font-extrabold text-[#2E2E2E] truncate">{{ t.name }}</div>
            <div class="text-xs opacity-60 mt-0.5">{{ formatRange(t) }}</div>
          </div>

          <div class="flex items-center gap-2 shrink-0">
            <span
              *ngIf="t.id === trip.activeTripId"
              class="text-xs px-2 py-1 rounded-full bg-[#FF5A5F]/10 text-[#FF5A5F] font-bold"
            >目前</span>

            <button
              *ngIf="t.id !== trip.activeTripId"
              class="btn-ghost px-3 py-1.5 text-xs"
              (click)="switchAndClose(t.id)"
            >切換</button>

            <!-- Edit button -->
            <button
              class="icon-btn"
              aria-label="Edit trip"
              (click)="editTrip(t)"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
              </svg>
            </button>

            <button
              *ngIf="trip.trips.length > 1"
              class="icon-btn"
              aria-label="Delete trip"
              (click)="deleteTrip(t.id)"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18"></path><path d="M8 6V4h8v2"></path>
                <path d="M19 6l-1 14H6L5 6"></path>
                <path d="M10 11v6"></path><path d="M14 11v6"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <button class="w-full btn-primary py-3 rounded-full font-extrabold" (click)="stage = 'add'">
        + 新增旅遊
      </button>
    </div>

    <!-- ADD FORM -->
    <div *ngIf="stage === 'add'" class="mt-5 space-y-4">
      <div>
        <div class="text-sm font-bold text-[#2E2E2E] mb-1">旅遊名稱</div>
        <input
          class="card bg-white w-full px-4 py-3"
          placeholder="例如：日本大阪 / 韓國首爾"
          [(ngModel)]="formName"
        />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <div class="text-sm font-bold text-[#2E2E2E] mb-1">開始日期</div>
          <input class="card bg-white w-full px-4 py-3 text-sm" type="date" [(ngModel)]="formStart" />
        </div>
        <div>
          <div class="text-sm font-bold text-[#2E2E2E] mb-1">結束日期</div>
          <input class="card bg-white w-full px-4 py-3 text-sm" type="date" [(ngModel)]="formEnd" />
        </div>
      </div>

      <div class="text-xs opacity-60" *ngIf="formStart && formEnd && formStart > formEnd">
        ⚠️ 結束日期不能早於開始日期
      </div>

      <div class="flex gap-3 pt-2">
        <button class="btn-ghost w-1/3 py-3" (click)="stage = 'list'">返回</button>
        <button
          class="btn-primary w-2/3 py-3"
          [style.opacity]="canSubmit ? '1' : '0.5'"
          (click)="submitAdd()"
        >建立旅遊</button>
      </div>
    </div>

    <!-- EDIT FORM -->
    <div *ngIf="stage === 'edit'" class="mt-5 space-y-4">
      <div>
        <div class="text-sm font-bold text-[#2E2E2E] mb-1">旅遊名稱</div>
        <input
          class="card bg-white w-full px-4 py-3"
          placeholder="例如：日本大阪 / 韓國首爾"
          [(ngModel)]="formName"
        />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <div class="text-sm font-bold text-[#2E2E2E] mb-1">開始日期</div>
          <input class="card bg-white w-full px-4 py-3 text-sm" type="date" [(ngModel)]="formStart" />
        </div>
        <div>
          <div class="text-sm font-bold text-[#2E2E2E] mb-1">結束日期</div>
          <input class="card bg-white w-full px-4 py-3 text-sm" type="date" [(ngModel)]="formEnd" />
        </div>
      </div>

      <div class="text-xs opacity-60" *ngIf="formStart && formEnd && formStart > formEnd">
        ⚠️ 結束日期不能早於開始日期
      </div>

      <div class="flex gap-3 pt-2">
        <button class="btn-ghost w-1/3 py-3" (click)="stage = 'list'">返回</button>
        <button
          class="btn-primary w-2/3 py-3"
          [style.opacity]="canSubmit ? '1' : '0.5'"
          (click)="submitEdit()"
        >儲存變更</button>
      </div>
    </div>
  </div>
</div>
