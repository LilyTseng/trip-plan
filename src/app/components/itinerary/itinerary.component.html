<!-- Date pills -->
<div class="flex overflow-x-auto pb-2 gap-2 no-scrollbar">
  <button
    *ngFor="let d of dates"
    class="flex-shrink-0 px-3 py-2 rounded-2xl text-center border transition min-w-[52px]"
    [style.background]="d === activeDate ? '#FF5A5F' : '#fff'"
    [style.color]="d === activeDate ? '#fff' : '#888'"
    [style.borderColor]="d === activeDate ? '#FF5A5F' : '#E5E5E5'"
    (click)="selectDate(d)"
  >
    <div class="text-[15px] font-extrabold leading-tight">{{ formatDate(d).split('（')[0] }}</div>
    <div class="text-[10px] font-medium leading-tight mt-0.5"
      [style.color]="d === activeDate ? 'rgba(255,255,255,0.7)' : '#bbb'">
      {{ formatDate(d).split('（')[1]?.replace('）','') }}
    </div>
  </button>
</div>

<!-- Google Maps route -->
<a *ngIf="mapsRouteUrl"
  [href]="mapsRouteUrl" target="_blank" rel="noreferrer"
  class="flex items-center gap-2 mt-2 mb-1 px-3 py-2 rounded-xl bg-blue-50 border border-blue-100 text-blue-600 text-xs font-bold hover:bg-blue-100 transition">
  <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
  </svg>
  📍 用 Google Maps 開啟今日路線
</a>

<!-- Event list -->
<div class="mt-4 space-y-3 event-list">
  <div *ngIf="activeEvents.length === 0" class="text-center py-12 text-gray-300">
    <div class="text-4xl mb-2">🗓️</div>
    <div class="text-sm">還沒有行程，點右下角 + 新增</div>
  </div>

  <div *ngFor="let e of activeEvents; let i = index"
    #cardEl
    [attr.data-event-id]="e.id"
    class="bg-white rounded-2xl border border-gray-100 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.08)] overflow-hidden transition-all duration-200"
    [class.opacity-30]="dragging && dragId === e.id"
    [class.scale-[0.97]]="dragging && dragId === e.id"
    [style.border-color]="dragging && dragOverIdx === i && dragId !== e.id ? '#FF5A5F' : ''"
    [style.border-top-width]="dragging && dragOverIdx === i && dragId !== e.id ? '3px' : ''"
    (touchstart)="onPointerDown($event, e, cardEl)"
    (touchend)="onPointerCancel()"
    (touchcancel)="onPointerCancel()"
    (mousedown)="onPointerDown($event, e, cardEl)"
    (mouseleave)="onPointerCancel()">
    <div class="flex items-stretch">
      <!-- Left color bar -->
      <div class="w-1 shrink-0"
        [style.background]="e.type === 'FOOD' ? '#FF896B' : e.type === 'PLAN' ? '#A0C4FF' : '#FF5A5F'">
      </div>

      <!-- Content -->
      <div class="flex-1 p-4 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <div class="min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-[10px] font-bold tracking-widest uppercase px-2 py-0.5 rounded-full"
                [style.background]="e.type === 'FOOD' ? '#FFF0EB' : e.type === 'PLAN' ? '#EBF1FF' : '#FFEBEC'"
                [style.color]="e.type === 'FOOD' ? '#FF6B35' : e.type === 'PLAN' ? '#4A7AFF' : '#FF5A5F'">
                {{ e.type }}
              </span>
              <span class="text-xs text-gray-400 font-medium">{{ e.time }}</span>
            </div>
            <div class="text-[15px] font-bold text-[#1A1A1A] leading-snug">{{ e.title }}</div>
          </div>

          <!-- Actions -->
          <div class="flex items-center gap-1.5 shrink-0">
            <a *ngIf="e.url" class="icon-btn text-[10px] font-bold" [href]="e.url" target="_blank" rel="noreferrer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
            <button class="icon-btn" (click)="editEvent.emit({ dateKey: activeDate, event: e })">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
              </svg>
            </button>
            <button class="icon-btn" (click)="deleteEvent(e.id)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18"/><path d="M8 6V4h8v2"/>
                <path d="M19 6l-1 14H6L5 6"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
