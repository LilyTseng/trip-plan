<!-- Search bar -->
<div class="mb-3">
  <div class="flex items-center gap-2">
    <div class="relative flex-1">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input
        class="w-full pl-9 pr-8 py-2.5 rounded-full bg-white border border-gray-200 text-sm placeholder-gray-400 focus:outline-none focus:border-[#FF5A5F] transition"
        placeholder="搜尋行程..."
        [(ngModel)]="searchQuery"
        (focus)="searchOpen = true"
      />
      <button *ngIf="searchQuery"
        class="absolute right-2.5 top-1/2 -translate-y-1/2 w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 text-xs"
        (click)="searchQuery = ''; searchOpen = false">×</button>
    </div>
  </div>

  <!-- Search results -->
  <div *ngIf="searchOpen && searchQuery && searchResults.length > 0"
    class="mt-2 bg-white rounded-2xl border border-gray-100 shadow-lg overflow-hidden max-h-64 overflow-y-auto">
    <div *ngFor="let r of searchResults"
      class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 active:bg-gray-100 transition cursor-pointer border-b border-gray-50 last:border-0"
      (click)="goToSearchResult(r.dateKey)">
      <span class="text-[10px] font-bold tracking-widest uppercase px-2 py-0.5 rounded-full shrink-0"
        [style.background]="r.event.type === 'FOOD' ? '#FFF0EB' : r.event.type === 'PLAN' ? '#EBF1FF' : '#FFEBEC'"
        [style.color]="r.event.type === 'FOOD' ? '#FF6B35' : r.event.type === 'PLAN' ? '#4A7AFF' : '#FF5A5F'">
        {{ r.event.type }}
      </span>
      <div class="min-w-0 flex-1">
        <div class="text-sm font-bold text-[#1A1A1A] truncate">{{ r.event.title }}</div>
        <div class="text-[11px] text-gray-400">{{ r.dateLabel }} · {{ r.event.time }}</div>
      </div>
      <svg class="w-4 h-4 text-gray-300 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </div>
  </div>
  <div *ngIf="searchOpen && searchQuery && searchResults.length === 0"
    class="mt-2 text-center py-4 text-sm text-gray-400">
    找不到符合「{{ searchQuery }}」的行程
  </div>
</div>

<!-- Date pills -->
<div class="flex overflow-x-auto pb-2 gap-2 no-scrollbar">
  <button
    *ngFor="let d of dates"
    class="flex-shrink-0 px-3 py-2 rounded-2xl text-center border transition min-w-[52px]"
    [style.background]="d === activeDate ? '#FF5A5F' : 'var(--bg-card)'"
    [style.color]="d === activeDate ? '#fff' : 'var(--text-secondary)'"
    [style.borderColor]="d === activeDate ? '#FF5A5F' : 'var(--border-card)'"
    (click)="selectDate(d)"
  >
    <div class="text-[15px] font-extrabold leading-tight">{{ formatDate(d).split('（')[0] }}</div>
    <div class="text-[10px] font-medium leading-tight mt-0.5"
      [style.color]="d === activeDate ? 'rgba(255,255,255,0.7)' : 'var(--text-muted)'">
      {{ formatDate(d).split('（')[1]?.replace('）','') }}
    </div>
    <div *ngIf="dayExpense(d) > 0" class="text-[9px] font-bold leading-tight mt-0.5"
      [style.color]="d === activeDate ? 'rgba(255,255,255,0.8)' : '#FF5A5F'">
      ${{ dayExpense(d).toLocaleString() }}
    </div>
  </button>
</div>

<!-- Google Maps route -->
<a *ngIf="mapsRouteUrl"
  [href]="mapsRouteUrl" target="_blank" rel="noreferrer"
  class="flex items-center gap-2 mt-2 mb-1 px-3 py-2 rounded-xl bg-blue-50 border border-blue-100 text-blue-600 text-xs font-bold hover:bg-blue-100 transition">
  <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
  </svg>
  📍 用 Google Maps 開啟今日路線
</a>

<!-- Event list -->
<div class="mt-4 space-y-3 event-list">
  <div *ngIf="activeEvents.length === 0" class="text-center py-12 text-gray-300">
    <div class="text-4xl mb-2">🗓️</div>
    <div class="text-sm">還沒有行程，點右下角 + 新增</div>
  </div>

  <div *ngFor="let e of activeEvents; let i = index"
    #cardEl
    [attr.data-event-id]="e.id"
    class="bg-white rounded-2xl border border-gray-100 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.08)] overflow-hidden transition-all duration-200"
    [class.opacity-30]="dragging && dragId === e.id"
    [class.scale-[0.97]]="dragging && dragId === e.id"
    [style.border-color]="dragging && dragOverIdx === i && dragId !== e.id ? '#FF5A5F' : ''"
    [style.border-top-width]="dragging && dragOverIdx === i && dragId !== e.id ? '3px' : ''"
    (touchstart)="onPointerDown($event, e, cardEl)"
    (touchend)="onPointerCancel()"
    (touchcancel)="onPointerCancel()"
    (mousedown)="onPointerDown($event, e, cardEl)"
    (mouseleave)="onPointerCancel()">
    <div class="flex items-stretch">
      <!-- Left color bar -->
      <div class="w-1 shrink-0"
        [style.background]="e.type === 'FOOD' ? '#FF896B' : e.type === 'PLAN' ? '#A0C4FF' : '#FF5A5F'">
      </div>

      <!-- Content -->
      <div class="flex-1 p-4 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <div class="min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-[10px] font-bold tracking-widest uppercase px-2 py-0.5 rounded-full"
                [style.background]="e.type === 'FOOD' ? '#FFF0EB' : e.type === 'PLAN' ? '#EBF1FF' : '#FFEBEC'"
                [style.color]="e.type === 'FOOD' ? '#FF6B35' : e.type === 'PLAN' ? '#4A7AFF' : '#FF5A5F'">
                {{ e.type }}
              </span>
              <span class="text-xs text-gray-400 font-medium">{{ e.time }}</span>
            </div>
            <div class="text-[15px] font-bold text-[#1A1A1A] leading-snug">{{ e.title }}</div>
          </div>

          <!-- Actions -->
          <div class="flex items-center gap-1.5 shrink-0">
            <a *ngIf="e.url" class="icon-btn text-[10px] font-bold" [href]="e.url" target="_blank" rel="noreferrer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
            <button class="icon-btn" (click)="editEvent.emit({ dateKey: activeDate, event: e })">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
              </svg>
            </button>
            <button class="icon-btn" (click)="deleteEvent(e.id)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18"/><path d="M8 6V4h8v2"/>
                <path d="M19 6l-1 14H6L5 6"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
