<div *ngIf="isOpen" class="fixed inset-0 z-[80] flex items-end sm:items-center justify-center">
  <div class="absolute inset-0 bg-black/35" (click)="close()"></div>

  <div
    class="relative w-full max-w-md mx-auto rounded-t-3xl sm:rounded-3xl bg-white shadow-[0_30px_90px_-35px_rgba(0,0,0,0.55)] border border-gray-200 p-5 sm:p-6"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-start justify-between">
      <div>
        <div class="text-xs uppercase tracking-widest opacity-60">
          {{ sheetMode === 'edit' ? 'Edit' : 'Add' }}
        </div>
        <div class="text-2xl h2 mt-1">{{ sheetStage === 'menu' ? '選擇類型' : '填寫內容' }}</div>
        <div class="text-sm opacity-60 mt-1" *ngIf="sheetStage === 'menu' && sheetContext === 'itinerary'">
          會依時間自動排序
        </div>
      </div>
      <button class="btn-ghost px-3 py-2 text-sm" (click)="close()">關閉</button>
    </div>

    <!-- MENU -->
    <div *ngIf="sheetStage === 'menu'" class="mt-5 space-y-3">
      <div *ngIf="sheetContext === 'itinerary'" class="space-y-3">
        <button class="card bg-white w-full p-4 text-left hover:bg-gray-50 transition" (click)="goAdd('itin-spot')">
          <div class="flex items-center justify-between">
            <div class="font-extrabold text-[#2E2E2E]">📍 景點 / 行程</div>
            <span class="text-xs px-2 py-1 rounded-full bg-[#FF5A5F]/10 text-[#FF5A5F] font-bold">SPOT</span>
          </div>
        </button>
        <button class="card bg-white w-full p-4 text-left hover:bg-gray-50 transition" (click)="goAdd('itin-food')">
          <div class="flex items-center justify-between">
            <div class="font-extrabold text-[#2E2E2E]">🍽️ 餐廳 / 用餐</div>
            <span class="text-xs px-2 py-1 rounded-full bg-[#FF5A5F]/10 text-[#FF5A5F] font-bold">FOOD</span>
          </div>
        </button>
        <button class="card bg-white w-full p-4 text-left hover:bg-gray-50 transition" (click)="goAdd('itin-plan')">
          <div class="flex items-center justify-between">
            <div class="font-extrabold text-[#2E2E2E]">✍️ 備註 / 交通 / 其他</div>
            <span class="text-xs px-2 py-1 rounded-full bg-[#FF5A5F]/10 text-[#FF5A5F] font-bold">PLAN</span>
          </div>
        </button>
      </div>

      <div *ngIf="sheetContext === 'packing'" class="space-y-3">
        <button class="card bg-white w-full p-4 text-left hover:bg-gray-50 transition" (click)="goAdd('packing')">
          <div class="font-extrabold text-[#1A1A1A]">🧳 新增行李項目</div>
        </button>
      </div>

      <div *ngIf="sheetContext === 'gift'" class="space-y-3">
        <button class="card bg-white w-full p-4 text-left hover:bg-gray-50 transition" (click)="goAdd('gift')">
          <div class="font-extrabold text-[#1A1A1A]">🎁 新增伴手禮項目</div>
        </button>
      </div>
    </div>

    <!-- FORM -->
    <div *ngIf="sheetStage === 'form'" class="mt-5 space-y-4">
      <div *ngIf="sheetKind.startsWith('itin')" class="space-y-3">
        <div>
          <div class="text-sm font-bold text-[#2E2E2E] mb-1">時間</div>
          <input class="card bg-white w-full px-4 py-3" placeholder="例如：09:00 / 下午 / 晚餐" [(ngModel)]="formTime" />
        </div>
        <div>
          <div class="text-sm font-bold text-[#2E2E2E] mb-1">標題</div>
          <input class="card bg-white w-full px-4 py-3" placeholder="例如：淺草雷門 / 天婦羅阿部" [(ngModel)]="formTitle" />
        </div>
        <div>
          <div class="text-sm font-bold text-[#2E2E2E] mb-1">地圖連結（可留空）</div>
          <input class="card bg-white w-full px-4 py-3" placeholder="貼 Google Maps 連結" [(ngModel)]="formUrl" />
        </div>
      </div>

      <div *ngIf="sheetKind === 'packing' || sheetKind === 'gift'" class="space-y-3">
        <div *ngIf="sheetMode === 'add'">
          <div class="text-sm font-bold text-[#2E2E2E] mb-1">插入位置</div>
          <select class="card bg-white w-full px-4 py-3" [(ngModel)]="formPos">
            <option *ngFor="let p of positionOptions" [ngValue]="p">第 {{ p }} 個</option>
          </select>
        </div>
        <div>
          <div class="text-sm font-bold text-[#2E2E2E] mb-1">項目名稱</div>
          <input class="card bg-white w-full px-4 py-3" placeholder="例如：行動電源 / 伴手禮（家人）" [(ngModel)]="formLabel" />
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button class="btn-ghost w-1/3 py-3" (click)="backToMenu()">返回</button>
        <button class="btn-primary w-2/3 py-3" (click)="submit()">
          {{ sheetMode === 'edit' ? '儲存' : '新增' }}
        </button>
      </div>
    </div>
  </div>
</div>
